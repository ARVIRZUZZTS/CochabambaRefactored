<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Encomienda</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/encomienda.css">
</head>
<body>
    <header>
        <img src="img/logoX.png" alt="">
    </header>
    <main>
        <div id="titulo">
            <h1>Ingresar datos de la Encomienda</h1>
            <h1 id="titleViaje"></h1>
        </div>
        <form id="encoForm">
            <div id="dataInp">
                <div class="box">
                    <input type="text" id="rem" maxlength="100" placeholder="REMITENTE">
                    <input type="number" id="remT" maxlength="15" placeholder="TELF REMITENTE">
                    <input type="text" id="con" maxlength="100" placeholder="CONSIGNATARIO">
                    <input type="number" id="conT" maxlength="15" placeholder="TELF CONSIGNATARIO">
                </div>
                <div class="box">
                    <textarea id="bul" maxlength="500" placeholder="BULTOS"></textarea>
                    <select id="dest" maxlength="500" placeholder="Destino"></select>
                    <div id="recio"></div>
                </div>
                <div id="boxLab">
                    <label><input id="valorDeclarado" type="checkbox" name="val"> Valor Declarado</label>
                    <div id="xpp"></div>
                </div>
            </div>
            <div class="but">
                <button type="button" onclick="back()" id="canc">Cancelar</button>
                <button type="button" onclick="fin()">Crear Encomienda  </button>
            </div>
            <p id="msgEnc">Llene los campos (contenido puede estar vacio, si no hay nada que llenar coloque una X).</p>
        </form>
    </main>
    <script src="js/encomienda.js"></script>
</body>
