<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Encomienda</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/editar.css">
</head>
<body>
    <header>
        <img src="img/logoX.png" alt="">
    </header>
    <main>
        <div id="titulo">
            <h1 id="titleEncomienda"></h1>
        </div>
        <form id="encoForm">
            <div id="dataInp">
                <div class="box">
                    <input type="text" id="rem" maxlength="100" name="rem">
                    <input type="text" id="remT" maxlength="15" name="remT" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <input type="text" id="con" maxlength="100" name="con">                    
                    <input type="text" id="conT" maxlength="15" name="conT" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="box">
                    <textarea id="bul" maxlength="500"></textarea>
                    <select id="dest" maxlength="500"></select>
                    <div id="recio"></div>
                </div>
                <div id="boxLab"></div>
            </div>
            <div id="butBox">
                <button type="button" onclick="eliminar()">Eliminar</button>
                <div class="but">
                    <button type="button" onclick="back()" id="canc">Cancelar</button>
                    <button type="button" onclick="actu()">Guardar Edicion</button>
                </div>
            </div>
            <p id="msgEnc">Llene los campos que desea EDITAR, puede dejarlo vacio si no quiere cambiar nada</p>
        </form>
    </main>
    <script src="js/editar.js"></script>
</body>
